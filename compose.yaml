services:
  physic:
    image: physic:cu128
    build:
      context: .
      args:
        CUDA_IMAGE: ${PHYSIC_CUDA_IMAGE:-nvidia/cuda:12.8.0-devel-ubuntu22.04}
        TORCH_CUDA_ARCH_LIST: ${TORCH_CUDA_ARCH_LIST:-12.0}
        PHYSIC_BUILD_JOBS: ${PHYSIC_BUILD_JOBS:-2}
        UV_CONCURRENT_DOWNLOADS: ${UV_CONCURRENT_DOWNLOADS:-2}
        UV_CONCURRENT_BUILDS: ${UV_CONCURRENT_BUILDS:-1}
        UV_CONCURRENT_INSTALLS: ${UV_CONCURRENT_INSTALLS:-2}
    working_dir: /workspace/Phy-SIC
    gpus: all
    cpus: ${PHYSIC_CPUS:-8}
    mem_limit: ${PHYSIC_MEM_LIMIT:-32g}
    shm_size: "16gb"
    environment:
      CAMERAHMR_DATA_DIR: /workspace/Phy-SIC/data
      DEPTH_PRO_CHECKPOINT: /workspace/Phy-SIC/data/depth_pro.pt
      MMPOSE_CONFIG: /workspace/Phy-SIC/data/mmpose/configs/wholebody_2d_keypoint/rtmpose/coco-wholebody/rtmpose-l_8xb64-270e_coco-wholebody-256x192.py
      MMPOSE_CHECKPOINT: /workspace/Phy-SIC/data/mmpose/rtmpose-l_simcc-coco-wholebody_pt-aic-coco_270e-256x192-6f206314_20230124.pth
      HF_HOME: /workspace/Phy-SIC/data/huggingface
      HF_HUB_CACHE: /workspace/Phy-SIC/data/huggingface/hub
      HUGGINGFACE_HUB_CACHE: /workspace/Phy-SIC/data/huggingface/hub
      TORCH_HOME: /workspace/Phy-SIC/data/torch
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      DIFFUSERS_OFFLINE: "1"
      PHYSIC_OMNI_DEVICE: ${PHYSIC_OMNI_DEVICE:-cuda}
      PHYSIC_OMNI_OFFLOAD: ${PHYSIC_OMNI_OFFLOAD:-model}
      PHYSIC_OMNI_IMAGE_SIZE: ${PHYSIC_OMNI_IMAGE_SIZE:-1024}
      PHYSIC_OMNI_STEPS: ${PHYSIC_OMNI_STEPS:-28}
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}
      PYOPENGL_PLATFORM: egl
      MAX_JOBS: ${PHYSIC_BUILD_JOBS:-2}
      UV_CONCURRENT_DOWNLOADS: ${UV_CONCURRENT_DOWNLOADS:-2}
      UV_CONCURRENT_BUILDS: ${UV_CONCURRENT_BUILDS:-1}
      UV_CONCURRENT_INSTALLS: ${UV_CONCURRENT_INSTALLS:-2}
    volumes:
      - .:/workspace/Phy-SIC
      - ${PHYSIC_DATA_DIR:-./data}:/workspace/Phy-SIC/data
      - ${PHYSIC_IMAGES_DIR:-./images}:/workspace/Phy-SIC/images
      - ${PHYSIC_OUTPUTS_DIR:-./outputs}:/workspace/Phy-SIC/outputs
    command: ["uv", "run", "--no-sync", "python", "run_optimizer.py"]
