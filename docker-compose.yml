services:
  physic:
    build:
      context: .
      dockerfile: Dockerfile
    image: physic:cu121
    working_dir: /workspace/Phy-SIC
    shm_size: "16gb"
    stdin_open: true
    tty: true
    gpus: all
    environment:
      AM_I_DOCKER: "False"
      BUILD_WITH_CUDA: "True"
      DATA_ROOT: data
      NVIDIA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
      PYOPENGL_PLATFORM: egl
      PYTHONPATH: /workspace/Phy-SIC:/workspace/Phy-SIC/external/CameraHMR:/workspace/Phy-SIC/external/lang-segment-anything:/workspace/Phy-SIC/external/ml-depth-pro/src:/workspace/Phy-SIC/external/ViTPose
      UV_LINK_MODE: copy
      UV_NO_SYNC: "1"
      UV_PROJECT_ENVIRONMENT: /opt/physic/.venv
      UV_PYTHON: /usr/bin/python3.10
    volumes:
      - .:/workspace/Phy-SIC
      - ${PHYSIC_DATA_DIR:-./data}:/workspace/Phy-SIC/data
      - ${PHYSIC_IMAGES_DIR:-./images}:/workspace/Phy-SIC/images
      - ${PHYSIC_OUTPUT_DIR:-./outputs}:/workspace/Phy-SIC/outputs
